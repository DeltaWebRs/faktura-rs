<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faktura — FakturaRS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @media print {
      body * { visibility: hidden; }
      #a4Content, #a4Content * { visibility: visible; }
      #a4Content { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>

<div class="invoice-actions-bar no-print" id="actionsBar">
  <a href="index.html" class="btn btn-secondary btn-sm">← Nazad</a>
  <button class="btn btn-secondary btn-sm" id="btnDownload">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
    Preuzmi PDF
  </button>
  <button class="btn btn-sm" id="btnToggleStatus"></button>
</div>

<div class="invoice-bg">
  <div class="a4" id="a4Content">
    <div id="loadingMsg" style="text-align:center;padding:80px;color:#999">Učitavanje fakture...</div>
  </div>
</div>

<script type="module">
import { api, requireAuth, toast, formatDate, formatAmount } from './api.js';

if (!requireAuth()) throw new Error('redirect');

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
if (!id) { window.location.href = 'index.html'; }

const PREDUZETNIK = {
  naziv: 'Vhirty / Damjan Dulović',
  pib: '115739720',
  mb: '68597455',
  adresa: 'Ruže Šulman 39, 23000 Zrenjanin, Srbija',
  email: 'hello@vhirty.com',
  ziro_rsd: '265-2030310001425-48',
  banka: 'Raiffeisen banka',
  iban: 'RS35265100000125019277',
  swift: 'RZBSRSBG',
};

let faktura;

async function load() {
  try {
    faktura = await api.getFaktura(id);
    render();
    updateStatusBtn();
  } catch (e) {
    document.getElementById('loadingMsg').textContent = 'Greška pri učitavanju fakture.';
    toast(e.message, 'error');
  }
}

function updateStatusBtn() {
  const btn = document.getElementById('btnToggleStatus');
  if (faktura.status === 'placena') {
    btn.className = 'btn btn-secondary btn-sm';
    btn.textContent = 'Označi neplaćenom';
  } else {
    btn.className = 'btn btn-success btn-sm';
    btn.textContent = 'Označi plaćenom';
  }
}

function numToWords(n) {
  // Simple display — not full SR word conversion
  return new Intl.NumberFormat('sr-RS', { minimumFractionDigits: 2 }).format(n);
}

function render() {
  const f = faktura;
  let stavke = [];
  try { stavke = typeof f.stavke === 'string' ? JSON.parse(f.stavke) : f.stavke; } catch {}

  const isDevizna = f.valuta !== 'RSD';

  const paymentInfo = isDevizna
    ? `<strong>IBAN:</strong> ${PREDUZETNIK.iban}<br>
       <strong>SWIFT:</strong> ${PREDUZETNIK.swift}<br>
       <strong>Banka:</strong> ${PREDUZETNIK.banka}`
    : `<strong>Žiro račun:</strong> ${PREDUZETNIK.ziro_rsd}<br>
       <strong>Banka:</strong> ${PREDUZETNIK.banka}`;

  document.getElementById('a4Content').innerHTML = `
    <div class="inv-header">
      <div class="inv-company">
        <h2>${PREDUZETNIK.naziv}</h2>
        <p>
          PIB: ${PREDUZETNIK.pib} &nbsp;|&nbsp; MB: ${PREDUZETNIK.mb}<br>
          ${PREDUZETNIK.adresa}<br>
          ${PREDUZETNIK.email}
        </p>
      </div>
      <div class="inv-title">
        <h1>FAKTURA</h1>
        <div class="inv-number">Broj: <strong>${f.broj}</strong></div>
        <div class="inv-date">Datum izdavanja: ${formatDate(f.datum_izdavanja)}</div>
        <div class="inv-date">Datum prometa: ${formatDate(f.datum_prometa)}</div>
        <div class="inv-date">Rok plaćanja: ${formatDate(f.datum_valute)}</div>
      </div>
    </div>

    <div class="inv-parties">
      <div class="inv-party">
        <h4>Izdavalac</h4>
        <p>
          <strong>${PREDUZETNIK.naziv}</strong><br>
          PIB: ${PREDUZETNIK.pib}<br>
          MB: ${PREDUZETNIK.mb}<br>
          ${PREDUZETNIK.adresa}<br>
          ${PREDUZETNIK.email}
        </p>
      </div>
      <div class="inv-party">
        <h4>Primalac</h4>
        <p>
          <strong>${f.klijent_naziv || '—'}</strong><br>
          ${f.klijent_pib ? `PIB: ${f.klijent_pib}<br>` : ''}
          ${f.klijent_mb ? `MB: ${f.klijent_mb}<br>` : ''}
          ${f.klijent_adresa ? `${f.klijent_adresa}<br>` : ''}
          ${f.klijent_email ? f.klijent_email : ''}
        </p>
      </div>
    </div>

    <table class="inv-table">
      <thead>
        <tr>
          <th>R.br.</th>
          <th>Naziv usluge / proizvoda</th>
          <th class="text-right">Količina</th>
          <th>Jed. mere</th>
          <th class="text-right">Cijena</th>
          <th class="text-right">Iznos</th>
        </tr>
      </thead>
      <tbody>
        ${stavke.map((s, i) => `
          <tr>
            <td>${i + 1}.</td>
            <td>${s.naziv}</td>
            <td class="text-right">${parseFloat(s.kolicina).toLocaleString('sr-RS')}</td>
            <td>${s.jedinica || 'kom'}</td>
            <td class="text-right">${formatAmount(s.cena, f.valuta)}</td>
            <td class="text-right"><strong>${formatAmount(s.ukupno, f.valuta)}</strong></td>
          </tr>
        `).join('')}
      </tbody>
    </table>

    <div class="inv-totals">
      <div class="inv-totals-box">
        <div class="total-grand">
          <span>UKUPNO ZA PLAĆANJE</span>
          <span>${formatAmount(f.ukupno, f.valuta)}</span>
        </div>
      </div>
    </div>

    <div class="inv-payment">
      <h4>Podaci za plaćanje</h4>
      <p>${paymentInfo}</p>
    </div>

    ${f.napomena ? `
    <div class="inv-payment">
      <h4>Napomena</h4>
      <p>${f.napomena}</p>
    </div>` : ''}

    <div class="inv-footer">
      <p>PDV nije obračunat na osnovu člana 33. Zakona o PDV (paušalni poreski obveznik).</p>
    </div>
  `;
}

document.getElementById('btnDownload').addEventListener('click', () => {
  window.print();
});

document.getElementById('btnToggleStatus').addEventListener('click', async () => {
  const newStatus = faktura.status === 'placena' ? 'neplacena' : 'placena';
  try {
    await api.updateStatus(id, newStatus);
    faktura.status = newStatus;
    toast(`Status promijenjen na "${newStatus === 'placena' ? 'plaćena' : 'neplaćena'}"`, 'success');
    updateStatusBtn();
  } catch (e) {
    toast(e.message, 'error');
  }
});

load();
</script>
</body>
</html>
